name: CI

on:
  push:
    branches: [main, develop, 'release/**', 'feature/**']
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore KimaiDotNet.ApiClient.sln

      - name: Build
        run: dotnet build KimaiDotNet.ApiClient.sln --no-restore -c Release

      - name: Test
        run: dotnet test KimaiDotNet.ApiClient.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/*.trx'

      - name: Pack (branch preview)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="0.0.0-branch.${SHORT_SHA}"
          dotnet pack src/KimaiDotNet.Core/KimaiDotNet.Core.csproj \
            -c Release \
            -p:Version=${VERSION} \
            -o ./nupkg

      - name: Upload branch package artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: nuget-branch-preview
          path: ./nupkg/

  publish:
    name: Pack & Publish to NuGet
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore KimaiDotNet.ApiClient.sln

      - name: Build
        run: dotnet build KimaiDotNet.ApiClient.sln --no-restore -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test KimaiDotNet.ApiClient.sln --no-build -c Release

      - name: Pack
        run: >
          dotnet pack src/KimaiDotNet.Core/KimaiDotNet.Core.csproj
          --no-build
          -c Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ./nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./nupkg/

